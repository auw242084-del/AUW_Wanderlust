<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AUW Wanderlust</title>
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .header { background: #5d3fd3; color: white; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 30px; }
        .container { max-width: 900px; margin: auto; }
        .btn-add { background: #27ae60; color: white; padding: 12px 25px; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .tour-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: white; padding: 20px; border-radius: 10px; shadow: 0 4px 8px rgba(0,0,0,0.1); border-top: 5px solid #5d3fd3; position: relative;}
        .card h3 { color: #333; margin-top: 0; }
        .budget { color: #e67e22; font-weight: bold; }
        .delete-btn { color: #ff4757; text-decoration: none; font-size: 0.8em; border: 1px solid #ff4757; padding: 2px 5px; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AUW Wanderlust 🌍</h1>
            <p>Your Ultimate Travel Companion</p>
        </div>

        <a href="/add" class="btn-add">+ Add New Tour</a>

        <div class="tour-grid">
            {% for tour in tours %}
            <div class="card">
                <h3>📍 {{ tour['title'] }}</h3>
                <p>{{ tour['description'] }}</p>
                <p class="budget">Budget: {{ tour['budget'] }}</p>
                <a href="{{ url_for('delete', id=tour['id']) }}" class="delete-btn" onclick="return confirm('Are you sure?')">Remove</a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
